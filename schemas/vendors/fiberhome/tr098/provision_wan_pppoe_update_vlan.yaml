id: wan_pppoe_update_vlan
vendor: fiberhome
model: tr098
description: >
  FiberHome TR-098 PPPoE VLAN + credential update on an existing WANPPPConnection.
  FiberHome uses standard TR-098 VLANID + VLANEnable on WANPPPConnection.
  Atomic single-step SetParameterValues updates credentials, VLAN, and IP mode.
  Input vars: wan_dev, wan_conn, wan_ppp_conn, username, password, vlan_id, wan_ip_mode.

steps:
  - kind: set
    params:
      "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice.{wan_conn}.WANPPPConnection.{wan_ppp_conn}.Username": "{username}"
      "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice.{wan_conn}.WANPPPConnection.{wan_ppp_conn}.Password": "{password}"
      "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice.{wan_conn}.WANPPPConnection.{wan_ppp_conn}.VLANEnable": "1"
      "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice.{wan_conn}.WANPPPConnection.{wan_ppp_conn}.VLANID": "{vlan_id}"
      "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice.{wan_conn}.WANPPPConnection.{wan_ppp_conn}.X_FH_IPMode": "{wan_ip_mode}"
      "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice.{wan_conn}.WANPPPConnection.{wan_ppp_conn}.Enable": "1"
