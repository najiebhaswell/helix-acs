id: wan_pppoe_update_vlan
vendor: zte
model: tr098
description: >
  ZTE TR-098 PPPoE VLAN + credential update on an existing WANPPPConnection.
  For ZTE TR-098, VLAN is stored as X_ZTE-COM_VLANID on WANPPPConnection.
  Atomic single-step SetParameterValues updates credentials, VLAN, and IP mode.
  Input vars: wan_dev, wan_conn, wan_ppp_conn, username, password, vlan_id, wan_ip_mode.

steps:
  - kind: set
    params:
      "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice.{wan_conn}.WANPPPConnection.{wan_ppp_conn}.Username": "{username}"
      "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice.{wan_conn}.WANPPPConnection.{wan_ppp_conn}.Password": "{password}"
      "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice.{wan_conn}.WANPPPConnection.{wan_ppp_conn}.X_ZTE-COM_VLANEnable": "1"
      "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice.{wan_conn}.WANPPPConnection.{wan_ppp_conn}.X_ZTE-COM_VLANID": "{vlan_id}"
      "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice.{wan_conn}.WANPPPConnection.{wan_ppp_conn}.X_ZTE-COM_IPMode": "{wan_ip_mode}"
      "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice.{wan_conn}.WANPPPConnection.{wan_ppp_conn}.Enable": "1"
