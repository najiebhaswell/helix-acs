id: zte_tr098
vendor: zte
model: tr098
description: >
  ZTE GPON ONU TR-098 baseline driver (F670L, F660, F6600 series).
  Built from live full-summon parameters collected from ZTE F670L ONT.
  WiFi: 8 SSIDs total — indices 1-4 are 2.4 GHz, indices 5-8 are 5 GHz.
  WAN: all connections under WANDevice.1.WANConnectionDevice.1.
  Internet identified via X_ZTE-COM_ServiceList containing "INTERNET".

features:
  nat: true
  ipv6: true
  gpon: true
  band_steering: false

config:
  default_mtu: "1492"
  wan_connection_type: "PPPoE_Routed"
  wan_service_list: "INTERNET"

security_modes:
  "WPA2-PSK":         "11i"
  "WPA-WPA2-PSK":     "WPAand11i"
  "WPA3-SAE":         "11i"
  "None":             "None"

wifi:
  sync_bands_on_steering: false

discovery:
  wifi_ssid_band_without_lower_layers:
    strategy: explicit
    explicit:
      "0": [1, 2, 3, 4]
      "1": [5, 6, 7, 8]

  # ZTE GPON/optical parameters are not always returned via WANDevice. tree fetch.
  # Fetch them explicitly so optical info panel is populated.
  extra_summon_paths:
    - "InternetGatewayDevice.WANDevice.1.X_ZTE-COM_GponInterfaceConfig."
    - "InternetGatewayDevice.WANDevice.1.X_ZTE-COM_WANPONInterfaceConfig."

  # ZTE uses non-standard system stat paths. Values are percentage strings:
  # X_ZTE-COM_CpuUsed: "1%;1%" (per-core, semicolon-separated)
  # X_ZTE-COM_MemUsed: "56%"
  system_cpu_path: "InternetGatewayDevice.DeviceInfo.X_ZTE-COM_CpuUsed"
  system_mem_pct_path: "InternetGatewayDevice.DeviceInfo.X_ZTE-COM_MemUsed"
