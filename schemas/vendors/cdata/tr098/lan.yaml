id: lan
model: tr098
vendor: cdata
description: >
  LAN and DHCP configuration parameters for C-DATA TR-098 GPON ONUs.
  C-DATA devices use standard TR-098 LANDevice hierarchy with configurable
  IP address, subnet mask, and DHCP server settings.

parameters:
  # LAN IP configuration
  - name: lan.ip_address
    path: "InternetGatewayDevice.LANDevice.{lan_dev}.LANHostConfigManagement.IPInterface.1.IPInterfaceIPAddress"
    type: string
  - name: lan.subnet_mask
    path: "InternetGatewayDevice.LANDevice.{lan_dev}.LANHostConfigManagement.IPInterface.1.IPInterfaceSubnetMask"
    type: string

  # DHCP server settings
  - name: dhcp.server_enable
    path: "InternetGatewayDevice.LANDevice.{lan_dev}.LANHostConfigManagement.DHCPServerEnable"
    type: boolean
  - name: dhcp.min_address
    path: "InternetGatewayDevice.LANDevice.{lan_dev}.LANHostConfigManagement.MinAddress"
    type: string
  - name: dhcp.max_address
    path: "InternetGatewayDevice.LANDevice.{lan_dev}.LANHostConfigManagement.MaxAddress"
    type: string

  # LAN DNS settings
  - name: lan.dns
    path: "InternetGatewayDevice.LANDevice.{lan_dev}.LANHostConfigManagement.DNSServers"
    type: string
