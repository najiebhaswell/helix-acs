id: port_forwarding
model: tr098
vendor: cdata
description: >
  Port forwarding parameters for C-DATA TR-098 GPON ONUs.
  Manages NAT port mapping rules for accessing internal services from WAN.

parameters:
  - name: portmapping.base
    path: "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice.{wan_conn}.WANIPConnection.{wan_ip_conn}.PortMapping."
    type: string
  - name: portmapping.count
    path: "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice.{wan_conn}.WANIPConnection.{wan_ip_conn}.PortMappingNumberOfEntries"
    type: unsignedInt
