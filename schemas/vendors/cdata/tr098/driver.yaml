id: cdata_tr098
vendor: cdata
model: tr098
description: >
  C-DATA GPON ONU TR-098 baseline driver (ZTEG/CDTC families).
  Built from live full-summon parameters from connected ONT.
  This baseline declares feature flags and value mappings; provision flows
  can be added incrementally after parameter validation.

features:
  nat: true
  ipv6: true
  gpon: true
  band_steering: true

config:
  default_mtu: "1492"
  provisioning_code: "helix.rPPP"
  wan_service_list: "INTERNET"
  wan_ip_mode: "1"

security_modes:
  "WPA2-PSK": "WPA2-PSK"
  "WPA-WPA2-PSK": "WPA-WPA2-PSK"
  "WPA3-SAE": "WPA3-SAE"
  "WPA3-SAE-WPA2-PSK": "WPA3-SAE-WPA2-PSK"
  "None": "None"

wifi:
  # Seen on CMS screenshots under WLANConfiguration.* as vendor extension.
  band_steering_path: "InternetGatewayDevice.LANDevice.1.WLANConfiguration.1.X_CMS_BAS"
  sync_bands_on_steering: true

discovery:
  system_cpu_path: "InternetGatewayDevice.DeviceInfo.X_CMS_CPUUsage"

provisions:
  wan_pppoe_new: "provision_wan_pppoe_new.yaml"
  wan_pppoe_update: "provision_wan_pppoe_update.yaml"
  wan_pppoe_update_vlan: "provision_wan_pppoe_update_vlan.yaml"

