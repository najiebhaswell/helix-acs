id: wan
model: tr098
vendor: cdata
description: >
  WAN interface parameters for C-DATA TR-098 GPON ONUs (e.g. FD514GD-R460).
  C-DATA ONUs use ZTE chipsets and follow TR-098 (InternetGatewayDevice) hierarchy.
  WAN objects are pre-provisioned; only credentials/VLAN need to be set (set_params).
  Vendor extensions use X_CT-COM namespace (China Telecom OEM).

parameters:
  # Service list from WANIPConnection (DHCP mode) — China Telecom extension.
  # Value is typically a comma-separated list, e.g. "INTERNET,TR069".
  - name: wan.service_type
    path: "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice.{wan_conn}.WANIPConnection.{wan_ip_conn}.X_CT-COM_ServiceList"
    type: string

  # Service list from WANPPPConnection (PPPoE mode) — fallback for PPPoE WANs.
  - name: wan.service_type_ppp
    path: "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice.{wan_conn}.WANPPPConnection.{wan_ppp_conn}.X_CT-COM_ServiceList"
    type: string

  # C-DATA devices have pre-existing WAN objects — no AddObject flow needed.
  - name: wan.provisioning_type
    path: "set_params"
    type: string

  # PPPoE credentials via WANPPPConnection (standard TR-098 path)
  - name: wan.pppoe_user
    path: "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice.{wan_conn}.WANPPPConnection.{wan_ppp_conn}.Username"
    type: string
  - name: wan.pppoe_pass
    path: "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice.{wan_conn}.WANPPPConnection.{wan_ppp_conn}.Password"
    type: string

  # Connection type via WANIPConnection (IP_Routed for DHCP)
  - name: wan.connection_type
    path: "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice.{wan_conn}.WANIPConnection.{wan_ip_conn}.ConnectionType"
    type: string

  # Connection type fallback via WANPPPConnection (PPPoE)
  - name: wan.connection_type_ppp
    path: "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice.{wan_conn}.WANPPPConnection.{wan_ppp_conn}.ConnectionType"
    type: string

  # Connection status (DHCP/IP_Routed via WANIPConnection)
  - name: wan.status
    path: "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice.{wan_conn}.WANIPConnection.{wan_ip_conn}.ConnectionStatus"
    type: string

  # Connection status fallback for PPPoE via WANPPPConnection
  - name: wan.status_ppp
    path: "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice.{wan_conn}.WANPPPConnection.{wan_ppp_conn}.ConnectionStatus"
    type: string

  # WAN IP address (from PPPConnection when PPPoE is active)
  - name: wan.ip_address
    path: "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice.{wan_conn}.WANPPPConnection.{wan_ppp_conn}.ExternalIPAddress"
    type: string

  # Fallback IP via WANIPConnection (used when DHCP WAN)
  - name: wan.ip_address_dhcp
    path: "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice.{wan_conn}.WANIPConnection.{wan_ip_conn}.ExternalIPAddress"
    type: string

  # Subnet mask via WANIPConnection (DHCP)
  - name: wan.subnet_mask
    path: "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice.{wan_conn}.WANIPConnection.{wan_ip_conn}.SubnetMask"
    type: string

  # Default gateway via WANIPConnection
  - name: wan.gateway
    path: "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice.{wan_conn}.WANIPConnection.{wan_ip_conn}.DefaultGateway"
    type: string

  # DNS servers via WANIPConnection (comma-separated)
  - name: wan.dns1
    path: "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice.{wan_conn}.WANIPConnection.{wan_ip_conn}.DNSServers"
    type: string

  # MTU via WANIPConnection
  - name: wan.mtu
    path: "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice.{wan_conn}.WANIPConnection.{wan_ip_conn}.MaxMTUSize"
    type: unsignedInt

  # Uptime in seconds via WANIPConnection
  - name: wan.uptime
    path: "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice.{wan_conn}.WANIPConnection.{wan_ip_conn}.Uptime"
    type: unsignedInt

  # MAC address from Ethernet interface
  - name: wan.mac
    path: "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice.{wan_conn}.WANIPConnection.{wan_ip_conn}.MACAddress"
    type: string

  # Traffic statistics from WANCommonInterfaceConfig
  - name: wan.stats.bytes_sent
    path: "InternetGatewayDevice.WANDevice.{wan_dev}.WANCommonInterfaceConfig.TotalBytesSent"
    type: unsignedInt
  - name: wan.stats.bytes_received
    path: "InternetGatewayDevice.WANDevice.{wan_dev}.WANCommonInterfaceConfig.TotalBytesReceived"
    type: unsignedInt
  - name: wan.stats.packets_sent
    path: "InternetGatewayDevice.WANDevice.{wan_dev}.WANCommonInterfaceConfig.TotalPacketsSent"
    type: unsignedInt
  - name: wan.stats.packets_received
    path: "InternetGatewayDevice.WANDevice.{wan_dev}.WANCommonInterfaceConfig.TotalPacketsReceived"
    type: unsignedInt
  - name: wan.stats.errors_sent
    path: ""
    type: unsignedInt
  - name: wan.stats.errors_received
    path: ""
    type: unsignedInt
