id: wan_pppoe_new
vendor: cdata
model: tr098
description: >
  C-DATA TR-098 PPPoE provisioning with WANConnectionDevice AddObject first.
  All parameters — including VLAN and Enable — are sent in a single atomic
  SetParameterValues AFTER the AddObject, so the PPPoE session never starts
  without a VLAN tag (which causes ERROR_UNKNOWN on CDATA hardware).
  ConnectionType is intentionally omitted; CDATA firmware auto-assigns it
  based on the WANPPPConnection object type (PPPoE).
  Input vars: wan_dev, wan_conn, wan_ppp_conn, vlan_id, username, password.

steps:
  - kind: add_object
    object: "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice."
    as: wan_conn

  - kind: set
    params:
      "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice.{wan_conn}.WANPPPConnection.{wan_ppp_conn}.Username": "{username}"
      "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice.{wan_conn}.WANPPPConnection.{wan_ppp_conn}.Password": "{password}"
      "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice.{wan_conn}.WANPPPConnection.{wan_ppp_conn}.X_CMS_Password": "{password}"
      "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice.{wan_conn}.WANPPPConnection.{wan_ppp_conn}.NATEnabled": "1"
      "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice.{wan_conn}.WANPPPConnection.{wan_ppp_conn}.X_CT-COM_IPMode": "{wan_ip_mode}"
      "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice.{wan_conn}.WANPPPConnection.{wan_ppp_conn}.X_CT-COM_ServiceList": "{wan_service_list}"
      "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice.{wan_conn}.WANPPPConnection.{wan_ppp_conn}.X_CT-COM_VLANMode": "2"
      "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice.{wan_conn}.WANPPPConnection.{wan_ppp_conn}.X_CT-COM_VLANIDMark": "{vlan_id}"
      "InternetGatewayDevice.WANDevice.{wan_dev}.WANConnectionDevice.{wan_conn}.WANPPPConnection.{wan_ppp_conn}.Enable": "1"
