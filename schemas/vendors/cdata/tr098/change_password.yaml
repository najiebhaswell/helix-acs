id: change_password
model: tr098
vendor: cdata
description: >
  Web administration password parameter for C-DATA TR-098 GPON ONUs.
  C-DATA uses vendor-specific X_CT-COM namespace for local web admin password.
  This allows ACS to set the password for local web interface access.

parameters:
  # Web admin password via vendor-specific extension
  # Note: C-DATA ONUs may use different vendor namespaces (X_CT-COM for China Telecom OEM)
  - name: admin.password
    path: "InternetGatewayDevice.X_CT-COM.UserManagement.Users.User.1.Password"
    type: string
