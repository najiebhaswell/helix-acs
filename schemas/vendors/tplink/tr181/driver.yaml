id: tplink_tr181
vendor: tplink
model: tr181
description: >
  TP-Link GPON ONT TR-181 device driver.
  Handles vendor-specific X_TP_* parameter extensions including:
  GPON link management, VLAN mode, PPP domain, DHCPv6 SLAAC,
  default gateway, band steering, and connected host type detection.

features:
  gpon: true
  band_steering: true
  ipv6: true
  nat: true
  dhcpv6_client: true

config:
  ppp_auth_protocol: "AUTO_AUTH"
  default_mtu: "1492"
  optical_interface: "Device.Optical.Interface.1."
  gpon_root: "Device.X_TP_GPON.Link"
  provisioning_code: "helix.rPPP"

security_modes:
  "WPA2-PSK": "WPA2-Personal"
  "WPA-WPA2-PSK": "WPA-WPA2-Personal"
  "WPA3-SAE": "WPA3-Personal"
  "WPA3-SAE-WPA2-PSK": "WPA3-WPA2-Personal"
  "None": "None"

wifi:
  band_steering_path: "Device.WiFi.X_TP_BandSteering.Enable"
  multi_ssid_suffix_24g: "Device.WiFi.X_TP_MultiSSIDSuffix24G"
  multi_ssid_suffix_5g: "Device.WiFi.X_TP_MultiSSIDSuffix5G"
  sync_bands_on_steering: true

discovery:
  wan_type_path: "Device.IP.Interface.{i}.X_TP_ConnType"
  wan_type_values:
    wan:
      - "PPPoE"
      - "DHCP"
      - "Static"
    lan:
      - "LAN"
    bridge:
      - "Bridge"
  gpon_enable_path: "Device.X_TP_GPON.Link.{i}.Enable"
  wan_uptime_path: "Device.IP.Interface.{i}.X_TP_Uptime"
  wan_service_type_path: "Device.IP.Interface.{i}.X_TP_ServiceType"
  host_conn_type_path: "Hosts.Host.{i}.X_TP_LanConnType"
  host_conn_type_values:
    wifi: "1"
    lan: "0"

provisions:
  wan_pppoe_new: "provision_wan.yaml"
  wan_pppoe_delete_add: "provision_wan_delete_add.yaml"
  wan_pppoe_update: "provision_wan_update.yaml"
  wan_pppoe_update_vlan: "provision_wan_update_vlan.yaml"
