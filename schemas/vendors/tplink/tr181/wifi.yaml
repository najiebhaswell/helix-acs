id: wifi
model: tr181
vendor: tplink
description: WiFi configuration parameters for TP-Link TR-181 devices

parameters:
  # 2.4 GHz band (band index 0)
  # Uses placeholders that will be resolved to the actual device indices
  - name: wifi.ssid.0
    path: "Device.WiFi.SSID.{ssid_0}.SSID"
    type: string
  - name: wifi.password.0
    path: "Device.WiFi.AccessPoint.{ap_0}.Security.KeyPassphrase"
    type: string
  - name: wifi.enabled.0
    path: "Device.WiFi.SSID.{ssid_0}.Enable"
    type: boolean
  - name: wifi.channel.0
    path: "Device.WiFi.Radio.{radio_0}.Channel"
    type: unsignedInt
  - name: wifi.bssid.0
    path: "Device.WiFi.SSID.{ssid_0}.BSSID"
    type: string
  - name: wifi.standard.0
    path: "Device.WiFi.Radio.{radio_0}.OperatingStandards"
    type: string
  - name: wifi.security_mode.0
    path: "Device.WiFi.AccessPoint.{ap_0}.Security.ModeEnabled"
    type: string
  - name: wifi.channel_width.0
    path: "Device.WiFi.Radio.{radio_0}.OperatingChannelBandwidth"
    type: string
  - name: wifi.tx_power.0
    path: "Device.WiFi.Radio.{radio_0}.TransmitPower"
    type: unsignedInt
  - name: wifi.client_count.0
    path: "Device.WiFi.AccessPoint.{ap_0}.AssociatedDeviceNumberOfEntries"
    type: unsignedInt
  - name: wifi.stats.bytes_sent.0
    path: "Device.WiFi.SSID.{ssid_0}.Stats.BytesSent"
    type: unsignedInt
  - name: wifi.stats.bytes_received.0
    path: "Device.WiFi.SSID.{ssid_0}.Stats.BytesReceived"
    type: unsignedInt
  - name: wifi.stats.packets_sent.0
    path: "Device.WiFi.SSID.{ssid_0}.Stats.PacketsSent"
    type: unsignedInt
  - name: wifi.stats.packets_received.0
    path: "Device.WiFi.SSID.{ssid_0}.Stats.PacketsReceived"
    type: unsignedInt
  - name: wifi.stats.errors_sent.0
    path: "Device.WiFi.SSID.{ssid_0}.Stats.ErrorsSent"
    type: unsignedInt
  - name: wifi.stats.errors_received.0
    path: "Device.WiFi.SSID.{ssid_0}.Stats.ErrorsReceived"
    type: unsignedInt

  # 5 GHz band (band index 1)
  # Uses placeholders that will be resolved to the actual device indices
  - name: wifi.ssid.1
    path: "Device.WiFi.SSID.{ssid_1}.SSID"
    type: string
  - name: wifi.password.1
    path: "Device.WiFi.AccessPoint.{ap_1}.Security.KeyPassphrase"
    type: string
  - name: wifi.enabled.1
    path: "Device.WiFi.SSID.{ssid_1}.Enable"
    type: boolean
  - name: wifi.channel.1
    path: "Device.WiFi.Radio.{radio_1}.Channel"
    type: unsignedInt
  - name: wifi.bssid.1
    path: "Device.WiFi.SSID.{ssid_1}.BSSID"
    type: string
  - name: wifi.standard.1
    path: "Device.WiFi.Radio.{radio_1}.OperatingStandards"
    type: string
  - name: wifi.security_mode.1
    path: "Device.WiFi.AccessPoint.{ap_1}.Security.ModeEnabled"
    type: string
  - name: wifi.channel_width.1
    path: "Device.WiFi.Radio.{radio_1}.OperatingChannelBandwidth"
    type: string
  - name: wifi.tx_power.1
    path: "Device.WiFi.Radio.{radio_1}.TransmitPower"
    type: unsignedInt
  - name: wifi.client_count.1
    path: "Device.WiFi.AccessPoint.{ap_1}.AssociatedDeviceNumberOfEntries"
    type: unsignedInt
  - name: wifi.stats.bytes_sent.1
    path: "Device.WiFi.SSID.{ssid_1}.Stats.BytesSent"
    type: unsignedInt
  - name: wifi.stats.bytes_received.1
    path: "Device.WiFi.SSID.{ssid_1}.Stats.BytesReceived"
    type: unsignedInt
  - name: wifi.stats.packets_sent.1
    path: "Device.WiFi.SSID.{ssid_1}.Stats.PacketsSent"
    type: unsignedInt
  - name: wifi.stats.packets_received.1
    path: "Device.WiFi.SSID.{ssid_1}.Stats.PacketsReceived"
    type: unsignedInt
  - name: wifi.stats.errors_sent.1
    path: "Device.WiFi.SSID.{ssid_1}.Stats.ErrorsSent"
    type: unsignedInt
  - name: wifi.stats.errors_received.1
    path: "Device.WiFi.SSID.{ssid_1}.Stats.ErrorsReceived"
    type: unsignedInt

  # Band Steering (TP-Link specific)
  # Band Steering allows both 2.4GHz and 5GHz bands to use the same SSID
  # When enabled, clients are automatically steered between bands
  - name: wifi.band_steering.enabled
    path: "Device.WiFi.X_TP_BandSteering.Enable"
    type: boolean
    writable: true
    description: "Enable/disable Band Steering - allows both 2.4GHz and 5GHz to use the same SSID"

  # Multi SSID Suffix (TP-Link specific)
  # When Band Steering is OFF, these suffixes are appended to SSID to differentiate bands
  # e.g., SSID="MyNetwork" with Suffix24G="-2.4G" results in "MyNetwork-2.4G" for 2.4GHz band
  - name: wifi.multi_ssid_suffix.24g
    path: "Device.WiFi.X_TP_MultiSSIDSuffix24G"
    type: string
    writable: true
    description: "SSID suffix for 2.4GHz band when Band Steering is OFF"

  - name: wifi.multi_ssid_suffix.5g
    path: "Device.WiFi.X_TP_MultiSSIDSuffix5G"
    type: string
    writable: true
    description: "SSID suffix for 5GHz band when Band Steering is OFF"

  - name: wifi.multi_ssid_suffix.6g
    path: "Device.WiFi.X_TP_MultiSSIDSuffix6G"
    type: string
    writable: true
    description: "SSID suffix for 6GHz band when Band Steering is OFF"
