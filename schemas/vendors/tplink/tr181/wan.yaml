id: wan
model: tr181
vendor: tplink
description: WAN interface parameters for TP-Link TR-181 devices

parameters:
  - name: wan.connection_type
    path: "Device.IP.Interface.{wan}.X_TP_ConnType"
    type: string
  - name: wan.service_type
    path: "Device.IP.Interface.{wan}.X_TP_ServiceType"
    type: string
  - name: wan.uptime
    path: "Device.IP.Interface.{wan}.X_TP_Uptime"
    type: unsignedInt
  - name: wan.provisioning_type
    path: "add_object"
    type: string
  # TP-Link GPON ONTs expose total WAN traffic on the optical uplink interface.
  # IP.Interface stats are per-connection and the discovered {wan} index often
  # points to an inactive interface. Optical.Interface.1 always reflects the
  # full cumulative bytes flowing through the WAN PON uplink.
  - name: wan.stats.bytes_sent
    path: "Device.Optical.Interface.1.Stats.BytesSent"
    type: unsignedInt
  - name: wan.stats.bytes_received
    path: "Device.Optical.Interface.1.Stats.BytesReceived"
    type: unsignedInt
