id: huawei_tr098
vendor: huawei
model: tr098
description: >
  Huawei GPON ONU TR-098 baseline driver (HG8145V5 and similar).
  CPU: InternetGatewayDevice.DeviceInfo.ProcessStatus.CPUUsage
  RAM: InternetGatewayDevice.DeviceInfo.MemoryStatus.{Free,Total}
  Optical: InternetGatewayDevice.WANDevice.1.X_GponInterfaceConfig.*
  WAN service list: X_HW_SERVICELIST (uppercase, values: INTERNET / TR069)

features:
  nat: true
  ipv6: false
  gpon: true
  band_steering: false

config:
  default_mtu: "1492"
  wan_service_list: "INTERNET"

security_modes:
  "WPA2-PSK":     "11i"
  "WPA-WPA2-PSK": "WPAand11i"
  "WPA3-SAE":     "11i"
  "None":         "Basic"

wifi:
  sync_bands_on_steering: false

discovery:
  # Huawei stores CPU/RAM under standard TR-098 DeviceInfo paths.
  # No custom system_cpu_path needed — extracted generically.

  # Huawei GPON optical parameters are under X_GponInterfaceConfig.
  # Also fetch X_HW_PonInterface for redundancy.
  extra_summon_paths:
    - "InternetGatewayDevice.WANDevice.1.X_GponInterfaceConfig."
    - "InternetGatewayDevice.WANDevice.1.X_HW_PonInterface."

  # Huawei uses X_HW_SERVICELIST (uppercase) to identify WAN service type.
  # Values: "INTERNET", "TR069", "VOIP".
  # Note: TR-098 WAN extraction detects ServiceList by case-insensitive suffix
  # match — no wan_service_type_path needed here.

  # VLAN is stored as X_HW_VLAN on each WANPPPConnection.
  wan_vlan_path: "InternetGatewayDevice.WANDevice.1.WANConnectionDevice.1.WANPPPConnection.1.X_HW_VLAN"

provisions:
  wan_pppoe_update: "provision_wan_pppoe_update.yaml"
  wan_pppoe_update_vlan: "provision_wan_pppoe_update_vlan.yaml"
  wifi_update: "../../common/provision_wifi.yaml"
