<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GMEDIA ACS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/style.css?v=20260424" rel="stylesheet">
  <!-- Prevent flash of wrong theme before CSS loads -->
  <script>(function(){var t=localStorage.getItem('helixTheme')||'light';document.documentElement.setAttribute('data-theme',t);}());</script>
</head>
<body>

<!-- ── Login screen ──────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card card">
    <div class="text-center mb-4">
      <div class="login-logo-wrap">
        <i class="bi bi-router login-logo"></i>
      </div>
      <h4 class="mt-3 mb-1 fw-bold">GMEDIA ACS</h4>
      <p class="text-muted small mb-0">Auto Configuration Server</p>
    </div>
    <form id="login-form">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" class="form-control" id="login-user" placeholder="admin" autocomplete="username" required>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" id="login-pass" placeholder="••••••••" autocomplete="current-password" required>
        </div>
      </div>
      <div id="login-error" class="alert alert-danger py-2 d-none"></div>
      <button type="submit" class="btn btn-primary w-100" id="login-btn">
        <span id="login-spinner" class="spinner-border spinner-border-sm me-2 d-none"></span>
        Sign In
      </button>
    </form>
  </div>
</div>

<!-- ── Sidebar overlay (mobile) ──────────────────────────── -->
<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- ── App shell ─────────────────────────────────────────── -->
<div id="app-shell" style="display:none">

  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="sidebar-brand">
      <i class="bi bi-router"></i>
      <div>
        GMEDIA ACS
        <span class="brand-sub">Auto Config Server</span>
      </div>
      <button class="sidebar-close-btn" onclick="closeSidebar()" aria-label="Close menu">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>
    <div class="sidebar-nav">
      <span class="nav-section">Main</span>
      <a class="nav-item" data-route="/" onclick="navigate('/')">
        <i class="bi bi-speedometer2"></i>
        <span>Dashboard</span>
      </a>
      <a class="nav-item" data-route="/devices" onclick="navigate('/devices')">
        <i class="bi bi-hdd-network"></i>
        <span>Devices</span>
      </a>
      <a class="nav-item" data-route="/default-params" onclick="navigate('/default-params')">
        <i class="bi bi-sliders"></i>
        <span>Virtual Parameters</span>
      </a>
      <span class="nav-section">System</span>
      <a class="nav-item" data-route="/health" onclick="navigate('/health')">
        <i class="bi bi-heart-pulse"></i>
        <span>System Health</span>
      </a>
    </div>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-user-avatar"><i class="bi bi-person"></i></div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="sidebar-username">Admin</div>
          <div class="sidebar-user-role">Administrator</div>
        </div>
        <button class="sidebar-logout-btn" onclick="doLogout()" title="Logout">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>
  </nav>

  <!-- Content area -->
  <div id="main-content">

    <!-- Topbar -->
    <header id="topbar">
      <button class="topbar-toggle" onclick="toggleSidebar()" aria-label="Open menu">
        <i class="bi bi-list"></i>
      </button>
      <div id="topbar-breadcrumb">
        <span id="topbar-title">Dashboard</span>
      </div>
      <div class="topbar-spacer"></div>
      <div class="topbar-actions">
        <button class="topbar-icon-btn" title="Refresh" onclick="location.reload()">
          <i class="bi bi-arrow-clockwise"></i>
        </button>
        <button class="topbar-icon-btn" id="theme-toggle-btn" title="Toggle theme" onclick="toggleTheme()">
          <i class="bi bi-moon" id="theme-toggle-icon"></i>
        </button>
        <div class="topbar-divider"></div>
        <button class="topbar-user-btn" onclick="doLogout()" title="Logout">
          <div class="topbar-avatar"><i class="bi bi-person"></i></div>
          <span class="topbar-username" id="topbar-username">Admin</span>
          <i class="bi bi-box-arrow-right topbar-logout-icon"></i>
        </button>
      </div>
    </header>

    <div id="view-content" class="page-body"></div>
  </div>
</div>

<!-- ── Toast container ───────────────────────────────────── -->
<div id="toast-container"></div>

<!-- ── Task creation modal ───────────────────────────────── -->
<div class="modal fade" id="taskModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-plus-circle me-2 text-primary"></i>Create Task</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label fw-semibold">Task Type</label>
          <select class="form-select" id="task-type-select" onchange="renderTaskForm()">
            <optgroup label="Configuration">
              <option value="wifi">📶 WiFi Configuration</option>
              <option value="wan">🌐 WAN Configuration</option>
              <option value="lan">🔌 LAN / DHCP Configuration</option>
              <option value="web-admin">🔑 Web Interface Password</option>
              <option value="parameters">⚙️ Set Parameters (Advanced)</option>
              <option value="firmware">💾 Firmware Update</option>
              <option value="port-forwarding">↪️ Port Forwarding</option>
            </optgroup>
            <optgroup label="Diagnostics">
              <option value="ping">🏓 Ping Test</option>
              <option value="traceroute">🗺️ Traceroute</option>
              <option value="speed-test">⚡ Speed Test</option>
              <option value="connected-devices">📱 Connected Devices</option>
              <option value="cpe-stats">📊 CPE Statistics</option>
            </optgroup>
            <optgroup label="Maintenance">
              <option value="reboot">🔄 Reboot</option>
              <option value="factory-reset">🏭 Factory Reset</option>
            </optgroup>
          </select>
        </div>
        <div id="task-form-body"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" id="task-submit-btn" onclick="submitTask()">
          <i class="bi bi-send me-1"></i> Queue Task
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ── Confirm modal ─────────────────────────────────────── -->
<div class="modal fade" id="confirmModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title text-danger"><i class="bi bi-exclamation-triangle me-2"></i>Confirm</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body pt-2" id="confirm-message">Are you sure?</div>
      <div class="modal-footer border-0 pt-0">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-danger btn-sm" id="confirm-ok-btn">Confirm</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Tags edit modal ────────────────────────────────────── -->
<div class="modal fade" id="tagsModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-tags me-2 text-primary"></i>Edit Tags</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <label class="form-label small text-muted">Tags (comma separated)</label>
        <input type="text" class="form-control" id="tags-input" placeholder="tag1, tag2, tag3">
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary btn-sm" id="tags-save-btn">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/app.js?v=20260424b"></script>
</body>
</html>
